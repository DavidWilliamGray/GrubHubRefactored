<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <title>GrubHub - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      rel="stylesheet"
    />
    <link href="assets/css/styles.css" rel="stylesheet" />
    <link rel="icon" href="assets/icons/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
    <meta name="theme-color" content="#6f42c1" />
  </head>
  <body data-page="login">
    <a class="skip-link" href="#mainContent">Skip to main content</a>
    <div
      aria-atomic="true"
      aria-live="polite"
      class="live-region"
      id="sr-announcer-polite"
    ></div>
    <div
      aria-atomic="true"
      aria-live="assertive"
      class="live-region"
      id="sr-announcer-assertive"
    ></div>
    <section class="mobile-only" id="mobileAuth">
      <header class="sticky-head border-bottom">
        <nav aria-label="Primary" class="navbar bg-white">
          <div class="container-fluid">
            <span class="navbar-brand mx-auto brand-accent">GrubHub</span>
          </div>
        </nav>
      </header>
      <main class="container py-3 focus-target" id="mainContent" tabindex="-1">
        <h1 class="visually-hidden" id="pageHeading">
          Log in or create a GrubHub account
        </h1>
        <div class="card shadow-smooth">
          <div class="card-body">
            <ul
              aria-label="Authentication options"
              class="nav nav-pills pill-tabs mb-3"
              role="tablist"
            >
              <li class="nav-item" role="presentation">
                <button
                  aria-controls="pane-login"
                  aria-selected="true"
                  class="nav-link active"
                  data-bs-target="#pane-login"
                  data-bs-toggle="tab"
                  id="tab-login"
                  role="tab"
                  type="button"
                >
                  Log in
                </button>
              </li>
              <li class="nav-item" role="presentation">
                <button
                  aria-controls="pane-signup"
                  aria-selected="false"
                  class="nav-link"
                  data-bs-target="#pane-signup"
                  data-bs-toggle="tab"
                  id="tab-signup"
                  role="tab"
                  tabindex="-1"
                  type="button"
                >
                  Create account
                </button>
              </li>
            </ul>
            <div class="tab-content">
              <div
                aria-labelledby="tab-login"
                class="tab-pane fade show active"
                id="pane-login"
                role="tabpanel"
              >
                <form class="vstack gap-2" id="loginForm">
                  <div>
                    <label class="form-label" for="loginEmail">Email</label
                    ><input
                      autocomplete="email"
                      class="form-control"
                      id="loginEmail"
                      required=""
                      type="email"
                    />
                  </div>
                  <div>
                    <label class="form-label" for="loginPassword"
                      >Password</label
                    ><input
                      autocomplete="current-password"
                      class="form-control"
                      id="loginPassword"
                      required=""
                      type="password"
                    />
                  </div>
                  <div
                    aria-atomic="true"
                    aria-live="polite"
                    class="small text-danger"
                    id="loginMsg"
                    role="status"
                  ></div>
                  <button class="btn btn-brand mt-1 w-100">Log in</button>
                </form>
              </div>
              <div
                aria-labelledby="tab-signup"
                class="tab-pane fade"
                hidden
                id="pane-signup"
                role="tabpanel"
              >
                <div class="alert alert-secondary py-2 mb-2">
                  Passwords are <strong>securely hashed</strong> by Supabase
                  Auth.
                </div>
                <form class="vstack gap-2" id="signupForm">
                  <div>
                    <label class="form-label" for="signupEmail">Email</label
                    ><input
                      autocomplete="email"
                      class="form-control"
                      id="signupEmail"
                      required=""
                      type="email"
                    />
                  </div>
                  <div>
                    <label class="form-label" for="signupPassword"
                      >Password</label
                    ><input
                      autocomplete="new-password"
                      class="form-control"
                      id="signupPassword"
                      minlength="6"
                      required=""
                      type="password"
                    />
                  </div>
                  <div
                    aria-atomic="true"
                    aria-live="polite"
                    class="small"
                    id="signupMsg"
                    role="status"
                  ></div>
                  <button class="btn btn-success mt-1 w-100">
                    Create account
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </main>
    </section>
    <section class="desktop-only" id="desktopMarketing">
      <header class="bg-white border-bottom">
        <nav aria-label="Primary" class="navbar container py-3">
          <a class="navbar-brand fs-4 brand-accent" href="index.html"
            >GrubHub</a
          >
          <div class="ms-auto">
            <a class="btn btn-brand" href="index.html#get-app">Get the App</a>
          </div>
        </nav>
      </header>
      <main class="container py-5 text-center">
        <h1 class="fw-bold">GrubHub works best on mobile</h1>
        <p class="text-muted">
          Open this on your phone or download the app to get started.
        </p>
        <div class="d-flex justify-content-center gap-2">
          <a class="btn btn-dark"
            ><i aria-hidden="true" class="bi bi-apple me-1"></i> App Store</a
          >
          <a class="btn btn-dark"
            ><i aria-hidden="true" class="bi bi-google-play me-1"></i> Google
            Play</a
          >
        </div>
      </main>
      <footer class="border-top py-4 text-center text-muted">
        © <span class="year"></span> GrubHub. All rights reserved.
      </footer>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="assets/js/app.js" type="module"></script>
  </body>
</html>
