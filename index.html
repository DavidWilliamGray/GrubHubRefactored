<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <title>GrubHub</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      rel="stylesheet"
    />
    <link href="assets/css/styles.css" rel="stylesheet" />
    <link rel="icon" href="assets/icons/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
    <meta name="theme-color" content="#6f42c1" />
  </head>
  <body data-page="index">
    <a class="skip-link" href="#mainContent">Skip to main content</a>
    <div
      aria-atomic="true"
      aria-live="polite"
      class="live-region"
      id="sr-announcer-polite"
    ></div>
    <div
      aria-atomic="true"
      aria-live="assertive"
      class="live-region"
      id="sr-announcer-assertive"
    ></div>
    <section class="mobile-only">
      <div class="container py-5 text-center">
        <div class="spinner-border text-secondary mb-3" role="status"></div>
        <p class="text-muted">Opening GrubHub…</p>
      </div>
    </section>
    <section class="desktop-only" id="desktopMarketing">
      <header class="bg-white border-bottom">
        <nav aria-label="Primary" class="navbar container py-3">
          <a class="navbar-brand fs-4 brand-accent" href="index.html"
            >GrubHub</a
          >
          <div class="ms-auto">
            <a class="btn btn-brand" href="index.html#get-app">Get the App</a>
          </div>
        </nav>
      </header>
      <main
        class="container py-5 text-center focus-target"
        id="mainContent"
        tabindex="-1"
      >
        <h1 class="visually-hidden" id="pageHeading">
          GrubHub mobile launcher
        </h1>
        <h1 class="fw-bold">GrubHub works best on mobile</h1>
        <p class="text-muted">
          Open this on your phone or download the app to get started.
        </p>
        <div class="d-flex justify-content-center gap-2">
          <a class="btn btn-dark"
            ><i aria-hidden="true" class="bi bi-apple me-1"></i> App Store</a
          >
          <a class="btn btn-dark"
            ><i aria-hidden="true" class="bi bi-google-play me-1"></i> Google
            Play</a
          >
        </div>
      </main>
      <footer class="border-top py-4 text-center text-muted">
        © <span class="year"></span> GrubHub. All rights reserved.
      </footer>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="assets/js/app.js" type="module"></script>
  </body>
</html>
